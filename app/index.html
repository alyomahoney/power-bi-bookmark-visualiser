<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      /* keep storage key in sync with STORAGE_KEY in src/store/uiStore.ts */
      (function () {
        try {
          var stored = localStorage.getItem('pbi-bookmark-app-theme');
          if (stored === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          /* localStorage unavailable (private browsing, sandboxed iframe) — default dark */
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Power BI Bookmark Visualiser</title>
    <meta name="description" content="Instantly audit every bookmark in your Power BI report. See what each bookmark changes, hides, and filters — without opening Power BI Desktop. Runs entirely in your browser." />
    <meta property="og:title" content="Power BI Bookmark Visualiser" />
    <meta property="og:description" content="Instantly audit every bookmark in your Power BI report. See what each bookmark changes, hides, and filters — without opening Power BI Desktop. Runs entirely in your browser." />
    <meta property="og:image" content="https://pbibookmark.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://pbibookmark.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
